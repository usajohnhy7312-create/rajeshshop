<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack Seller Panel</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --panel-bg: #161b22;
            --accent-color: #00ff66;
            --danger-color: #ff3b30;
            --warning-color: #ffcc00;
            --text-color: #ffffff;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 25px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #21262d;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #00cc52;
        }

        button:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none;
        }

        .profile-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #21262d;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-color);
        }

        .wallet-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .wallet-amt {
            color: var(--accent-color);
            font-weight: bold;
        }

        .btn-add-credit {
            background: rgba(0, 255, 102, 0.1);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: auto;
            text-transform: none;
            transition: all 0.3s;
        }

        .btn-add-credit:hover {
            background: var(--accent-color);
            color: #000;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #1f242c;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .stat-card p {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-card h3 {
            font-size: 22px;
            color: var(--accent-color);
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .price-display {
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid rgba(0, 255, 102, 0.2);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-val {
            font-size: 18px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .result-box {
            background: #1f242c;
            border: 1px dashed var(--accent-color);
            border-radius: 6px;
            padding: 15px;
            margin-top: 20px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .badge-active {
            background: rgba(0, 255, 102, 0.2);
            color: var(--accent-color);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }

        .badge-blocked {
            background: rgba(255, 59, 48, 0.2);
            color: var(--danger-color);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }

        .key-display {
            font-family: monospace;
            background: #21262d;
            padding: 5px;
            border-radius: 4px;
            color: var(--accent-color);
            font-weight: bold;
            font-size: 13px;
        }

        .copy-btn {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 3px 8px;
            font-size: 11px;
            width: auto;
            display: inline-block;
            margin-left: 5px;
            text-transform: none;
        }

        .copy-btn:hover {
            background: var(--accent-color);
            color: #000;
        }

        .history-section {
            margin-top: 25px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .history-title {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            text-align: left;
        }

        th, td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            color: var(--text-muted);
            background: #1f242c;
        }

        .history-actions {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .btn-table-action {
            padding: 3px 6px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            text-transform: uppercase;
        }

        .btn-table-reset {
            background: #1f242c;
            color: var(--warning-color);
            border: 1px solid var(--warning-color);
        }
        .btn-table-reset:hover {
            background: var(--warning-color);
            color: #000;
        }

        .btn-table-block {
            background: #1f242c;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }
        .btn-table-block:hover {
            background: var(--danger-color);
            color: #000;
        }
    </style>
</head>
<body>

    <div id="loginPage" class="container">
        <h1>Hack Seller Panel</h1>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter Username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>
            <button type="submit">Enter</button>
        </form>
    </div>

    <div id="dashboardPage" class="container hidden">
        <h1>Hack Seller Panel</h1>
        
        <div class="profile-bar">
            <span>Welcome, Admin</span>
            <div class="wallet-section">
                <span id="walletDisplay" class="wallet-amt">Amount: ₹9,870</span>
                <button class="btn-add-credit" onclick="addCreditPrompt()">Add Credit +</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <p>Total Keys</p>
                <h3>20549</h3>
            </div>
            <div class="stat-card">
                <p>Monthly</p>
                <h3>₹51,690</h3>
            </div>
            <div class="stat-card">
                <p>Today</p>
                <h3>₹740</h3>
            </div>
        </div>

        <div class="form-group">
            <label>Select Product</label>
            <select id="productSelect">
                <option value="ALPHA">Alpha Regedit iOS</option>
                <option value="BRMODS">BR MODS ROOT ANDROID</option>
                <option value="FFPROXY">FF PROXY ANDROID DRIP</option>
                <option value="FLUORITE">FLUORITE 8 BALLPOOL IOS</option>
                <option value="GBOX">GBOX OFFICIAL</option>
                <option value="GLORYBOT">GUILD GLORY BOT</option>
                <option value="MIGUL">MIGUL - MONITE IOS [BASIC]</option>
                <option value="MIGUL">MIGUL - MONITE IOS [PRO]</option>
                <option value="STRICKS">Stricks BR (ALPHA-X)</option>
                <option value="BRMODS">BR MODS SILENTAIM PC</option>
                <option value="DRIP">Drip Client ApkMod</option>
                <option value="DRIP">Drip Client Pc Exe</option>
                <option value="DRIP">Drip Client Root</option>
                <option value="ESIGN">Esign Certificate</option>
                <option value="EZTEAM">EzTeam 8BP Apk</option>
                <option value="FLUORITE">Fluorite iOS FF</option>
                <option value="HGMOD">HG ApkMod + Root</option>
                <option value="HAXX">Haxx Cker Pro</option>
                <option value="LKTEAM">Lkteam Root + Pc</option>
                <option value="PATOTEAM">PatoTeam ApkMod</option>
                <option value="PRIME">Prime ApkMod</option>
            </select>
        </div>

        <div class="form-group">
            <label>Duration</label>
            <select id="durationSelect" onchange="updatePrice()"></select>
        </div>

        <div class="form-group">
            <label>Max Devices Allowed</label>
            <select id="deviceSelect">
                <option>1 Device</option>
                <option>2 Devices</option>
                <option>3 Devices</option>
                <option>4 Devices</option>
                <option>5 Devices</option>
                <option>Unlimited Devices</option>
            </select>
        </div>

        <div class="price-display">
            <span style="font-size: 14px; color: var(--text-muted);">Calculated Price:</span>
            <span id="calculatedPrice" class="price-val">₹40</span>
        </div>

        <button onclick="generateKey()">Generate Key</button>

        <div id="resultBox" class="result-box hidden">
            <div class="result-row">
                <span>Status:</span>
                <span id="resStatus" class="badge-active">ACTIVE</span>
            </div>
            <div class="result-row">
                <span>Product Name:</span>
                <span id="resProduct" style="color: var(--text-muted);"></span>
            </div>
            <div class="result-row">
                <span>Duration / Device:</span>
                <span id="resDetails" style="color: var(--text-muted);"></span>
            </div>
            <div class="result-row" style="align-items: center; margin-top: 10px;">
                <span>Generated Key:</span>
                <div>
                    <span id="resKey" class="key-display"></span>
                    <button class="copy-btn" onclick="copyKey()">Copy</button>
                </div>
            </div>
            <div class="result-row" style="font-size: 11px; margin-top: 5px; color: var(--text-muted);">
                <span>Expiry:</span>
                <span id="resExpiry"></span>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">Key Generation History</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Product</th>
                            <th>Key</th>
                            <th>Status & Actions</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // Syncing with your structural balance value (₹9,870)
        let currentBalance = 9870;

        // Setup Duration options dynamically
        const durationSelect = document.getElementById('durationSelect');
        for (let i = 1; i <= 30; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i === 1 ? "1 Day" : i + " Days";
            durationSelect.appendChild(opt);
        }

        function updatePrice() {
            const days = parseInt(document.getElementById('durationSelect').value);
            let price = 40;
            if (days > 1) {
                price = 40 + (days - 1) * 20; 
            }
            document.getElementById('calculatedPrice').innerText = "₹" + price;
        }

        function handleLogin(event) {
            event.preventDefault();
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            updatePrice();
        }

        // Add Credit Action Logic
        function addCreditPrompt() {
            let amountInput = prompt("Enter the credit amount to add (₹):");
            if (amountInput === null) return; 
            
            let amount = parseInt(amountInput);
            if (isNaN(amount) || amount <= 0) {
                alert("Please enter a valid positive number!");
            } else {
                currentBalance += amount;
                document.getElementById('walletDisplay').innerText = "Amount: ₹" + currentBalance.toLocaleString('en-IN');
                alert("₹" + amount + " successfully credited to your account!");
            }
        }

        function makeRandomKey(productPrefix) {
            let result = productPrefix + '-';
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            for (let i = 0; i < 3; i++) {
                for(let j=0; j<4; j++) {
                    result += characters.charAt(Math.floor(Math.random() * characters.length));
                }
                if(i < 2) result += '-';
            }
            return result;
        }

        function generateKey() {
            const selectEl = document.getElementById('productSelect');
            const productName = selectEl.options[selectEl.selectedIndex].text;
            const productPrefix = selectEl.value;
            
            const days = parseInt(document.getElementById('durationSelect').value);
            const devices = document.getElementById('deviceSelect').value;
            
            const generatedKey = makeRandomKey(productPrefix);
            
            const now = new Date();
            now.setDate(now.getDate() + days);
            const expiryString = now.toLocaleString();
            const currentTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const statusBadge = document.getElementById('resStatus');
            statusBadge.className = "badge-active";
            statusBadge.innerText = "ACTIVE";

            document.getElementById('resProduct').innerText = productName;
            document.getElementById('resDetails').innerText = `${days} Days / ${devices}`;
            document.getElementById('resKey').innerText = generatedKey;
            document.getElementById('resExpiry').innerText = expiryString;
            document.getElementById('resultBox').classList.remove('hidden');

            const rowId = "row-" + Date.now();
            const tbody = document.getElementById('historyTableBody');
            const row = document.createElement('tr');
            row.id = rowId;
            row.innerHTML = `
                <td>${currentTime}</td>
                <td><strong>${productName}</strong><br><small style="color:var(--text-muted);">${days} Days | ${devices}</small></td>
                <td style="color:var(--accent-color); font-family:monospace;">${generatedKey}</td>
                <td>
                    <span class="status-cell badge-active">ACTIVE</span>
                    <div class="history-actions">
                        <button class="btn-table-action btn-table-reset" onclick="inlineResetKey('${generatedKey}')">Reset</button>
                        <button class="btn-table-action btn-table-block" onclick="inlineBlockKey('${rowId}', '${generatedKey}')">Block</button>
                    </div>
                </td>
            `;
            tbody.insertBefore(row, tbody.firstChild);
        }

        function inlineResetKey(key) {
            alert("Device binding for Key [" + key + "] has been successfully reset!");
        }

        function inlineBlockKey(rowId, key) {
            const row = document.getElementById(rowId);
            if(row) {
                const statusCell = row.querySelector('.status-cell');
                if(statusCell) {
                    statusCell.className = "status-cell badge-blocked";
                    statusCell.innerText = "BLOCKED";
                }
                const actionsDiv = row.querySelector('.history-actions');
                if(actionsDiv) actionsDiv.style.display = 'none';
            }

            const currentResultKey = document.getElementById('resKey').innerText;
            if(currentResultKey === key) {
                const upperStatus = document.getElementById('resStatus');
                upperStatus.className = "badge-blocked";
                upperStatus.innerText = "BLOCKED";
            }
            alert("Key [" + key + "] has been successfully blocked!");
        }

        function copyKey() {
            const keyText = document.getElementById('resKey').innerText;
            if (keyText) {
                navigator.clipboard.writeText(keyText);
                alert("Key copied successfully: " + keyText);
            }
        }
    </script>
</body>
</html>
